version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-streamscope}/backend:latest
    container_name: streamscope-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - streamscope-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/streamscope.db
      - ENVIRONMENT=development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: nginx:alpine
    container_name: streamscope-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  streamscope-data:
    driver: local

networks:
  default:
    name: streamscope-network
    driver: bridge
